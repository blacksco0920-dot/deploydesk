<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DeployDesk V2 首次部署体验可点击原型" />
    <title>DeployDesk V2 产品原型</title>
    <link rel="stylesheet" href="./styles.css" />
    <script
      defer
      src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.js"
    ></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div id="app" aria-live="polite"></div>
    <div class="scenario-control">
      <button
        class="icon-button"
        id="scenario-button"
        type="button"
        aria-label="切换原型场景"
        title="切换原型场景"
      >
        <i data-lucide="sliders-horizontal"></i>
      </button>
      <div class="scenario-menu" id="scenario-menu" hidden>
        <strong>原型场景</strong>
        <button type="button" data-scenario="home">返回用户首页</button>
        <button type="button" data-scenario="dns-error">DNS 异常恢复</button>
        <button type="button" data-scenario="reset">重置首次体验</button>
      </div>
    </div>
  </body>
</html>
