# 由 ABCDeploy 生成。真实 .env 只保存在目标环境。
name: abcdeploy-development
services:
  site:
    build:
      context: ../../..
      dockerfile: apps/site/Dockerfile
    restart: no
    extra_hosts:
    - host.docker.internal:host-gateway
    ports:
    - 127.0.0.1:4173:80
    environment:
      DEPLOYDESK_ENV: development
    networks:
      apps:
        aliases:
        - abcdeploy-development-site
        - abcdeploy-site
    labels:
      deploydesk.environment: development
      deploydesk.project: abcdeploy
      deploydesk.service: site
    healthcheck:
      test:
      - CMD-SHELL
      - wget -Y off -q --spider http://127.0.0.1:80/
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
networks:
  apps:
    external: false
    name: deploydesk-abcdeploy-development
