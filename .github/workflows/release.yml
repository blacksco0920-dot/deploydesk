name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-15
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg --ci
            signing_identity: "-"
          - name: macOS Intel
            os: macos-15
            rust_targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg --ci
            signing_identity: "-"
          - name: Linux x64
            os: ubuntu-22.04
            rust_targets: x86_64-unknown-linux-gnu
            args: --bundles appimage,deb --ci
            signing_identity: ""
          - name: Windows x64
            os: windows-2025
            rust_targets: x86_64-pc-windows-msvc
            args: --bundles nsis,msi --ci
            signing_identity: ""
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.rust_targets }}

      - name: 缓存 Rust 构建
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.os }}-${{ matrix.rust_targets }}

      - name: 安装 Linux 桌面依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建并上传安装包
        uses: tauri-apps/tauri-action@v1
        env:
          CI: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.signing_identity }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: ABCDeploy v__VERSION__
          releaseBody: |
            ABCDeploy 小白部署 Alpha 安装包。

            当前构建未配置商业代码签名证书，请下载后校验 GitHub Release 资产摘要。
          releaseDraft: false
          prerelease: true
          generateReleaseNotes: true
          args: ${{ matrix.args }}
