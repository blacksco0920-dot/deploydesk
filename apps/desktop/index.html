<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/abcdeploy.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ABCDeploy 小白部署：引导式容器化部署工作台"
    />
    <title>ABCDeploy 小白部署</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }

      body {
        background: #f7f7f5;
        color: #20201e;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .startup-shell {
        box-sizing: border-box;
        display: grid;
        height: 100%;
        place-items: center;
        padding: 24px;
      }

      .startup-status {
        align-items: center;
        display: flex;
        gap: 12px;
        font-size: 14px;
      }

      .startup-spinner {
        animation: startup-spin 0.8s linear infinite;
        border: 2px solid #d8d8d3;
        border-radius: 999px;
        border-top-color: #16846c;
        height: 18px;
        width: 18px;
      }

      @keyframes startup-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .startup-spinner {
          animation: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <main class="startup-shell" aria-live="polite">
        <div class="startup-status">
          <span class="startup-spinner" aria-hidden="true"></span>
          <span>正在打开 ABCDeploy</span>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
