# ABCDeploy 项目部署协议。这里只声明变量名，不保存真实密钥。
version: 1
project:
  name: abcdeploy
  description: ABCDeploy 小白部署官网
  commands:
    install: corepack enable && pnpm install --frozen-lockfile --filter @abcdeploy/site...
    verify:
    - pnpm --filter @abcdeploy/site build
source:
  provider: github
  repository: blacksco0920-dot/abcdeploy
  release_branch: main
services:
- id: site
  kind: static
  image: abcdeploy-site
  context: .
  dockerfile: apps/site/Dockerfile
  container_port: 80
  healthcheck:
    path: /
    interval_seconds: 10
    retries: 12
  migration: null
  runtime_env: []
  build_args: {}
environments:
  development:
    target:
      kind: local
      server: null
      namespace: abcdeploy-development
    branch: null
    auto_deploy: false
    approval_required: false
    domains: []
    database: null
    redis_namespace: null
    secrets_ref: local-keychain://development
  staging:
    target:
      kind: server
      server: tencent-primary
      namespace: abcdeploy-staging
    branch: null
    auto_deploy: true
    approval_required: false
    domains: []
    database: null
    redis_namespace: null
    secrets_ref: https://cnb.cool/blacksco0920/ecatSecret/-/blob/main/envs.yml
  production:
    target:
      kind: server
      server: tencent-primary
      namespace: abcdeploy-production
    branch: null
    auto_deploy: false
    approval_required: true
    domains: []
    database: null
    redis_namespace: null
    secrets_ref: https://cnb.cool/blacksco0920/finagent-secrets/-/blob/main/envs.yml
providers:
  build:
    kind: cnb
    repository: blacksco0920/abcdeploy
  registry:
    kind: tcr
    registry: ccr.ccs.tencentyun.com
    namespace: finagent
  runtime: ssh_docker_compose
  secrets: cnb_secret_repository
  approval: cnb_deployment
  dns: manual
  reverse_proxy: caddy
release:
  image_tag_template: sha-{commit}
  candidate_tag_template: deploydesk-{commit}
  production_mode: approval
  keep_releases: 5
  auto_rollback: true
  backup_before_migration: true
