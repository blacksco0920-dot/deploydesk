# ABCDeploy 试点：候选 Tag 只在测试部署成功并核对镜像摘要后创建。
environments:
  - name: production
    description: 把测试通过的同一镜像摘要发布到正式环境
    title: 发布 ABCDeploy 正式官网
    env:
      DEPLOYDESK_ENV: production
    permissions:
      roles:
        - owner
        - master
    require:
      - approver:
          roles:
            - owner
            - master
        title: 确认本次正式发布
