        printf '%s\n' "$SERVER_KNOWN_HOSTS" > "$KNOWN_HOSTS_FILE"
        chmod 600 "$SSH_KEY_FILE" "$KNOWN_HOSTS_FILE"
        DESTINATION="$SERVER_USER@$SERVER_HOST"
        ssh -i "$SSH_KEY_FILE" -p "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$DESTINATION" 'set -eu
        mkdir -p '"'"'.deploydesk/apps/deploydesk-hello-fullstack/staging'"'"' "$HOME/.deploydesk/caddy/sites"
