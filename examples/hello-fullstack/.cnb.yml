        SSH_KEY_FILE="$RUNTIME_DIRECTORY/deploydesk_key"
        KNOWN_HOSTS_FILE="$RUNTIME_DIRECTORY/known_hosts"
        printf '%s\n' "$SERVER_SSH_KEY" > "$SSH_KEY_FILE"
        printf '%s\n' "$SERVER_KNOWN_HOSTS" > "$KNOWN_HOSTS_FILE"
        chmod 600 "$SSH_KEY_FILE" "$KNOWN_HOSTS_FILE"
        DESTINATION="$SERVER_USER@$SERVER_HOST"
