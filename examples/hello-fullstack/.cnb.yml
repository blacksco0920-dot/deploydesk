        scp -i "$SSH_KEY_FILE" -P "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$RUNTIME_DIRECTORY/.release.env" "$DESTINATION:.deploydesk/apps/deploydesk-hello-fullstack/staging/.release.env.next"
        ssh -i "$SSH_KEY_FILE" -p "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$DESTINATION" 'set -eu
        cd '"'"'.deploydesk/apps/deploydesk-hello-fullstack/staging'"'"'
        backup_file() {
          if [ -f "$1" ]; then cp "$1" "$1.previous"; else rm -f "$1.previous"; fi
