        AUTH_HEADER="Authorization: Basic $(printf 'cnb:%s' "$CNB_TOKEN" | base64 | tr -d '\n')"
        REMOTE_SHA="$(git -c http.extraHeader="$AUTH_HEADER" ls-remote "$CNB_REPO_URL_HTTPS" "refs/tags/$CANDIDATE_TAG" | awk 'NR == 1 { print $1 }')"
        if [ -n "$REMOTE_SHA" ]; then test "$REMOTE_SHA" = "$CNB_COMMIT"; else git tag -f "$CANDIDATE_TAG" "$CNB_COMMIT"; git -c http.extraHeader="$AUTH_HEADER" push "$CNB_REPO_URL_HTTPS" "refs/tags/$CANDIDATE_TAG"; fi
