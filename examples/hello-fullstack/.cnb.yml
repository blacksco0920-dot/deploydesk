# 由 ABCDeploy 生成。流水线只引用密钥，不在仓库保存密钥值。
$:
  api_trigger_deployment_path_build:
  - docker:
      image: node:22-slim
    env:
      COREPACK_NPM_REGISTRY: https://registry.npmmirror.com
      NO_PROXY: registry.npmmirror.com
      no_proxy: registry.npmmirror.com
      npm_config_registry: https://registry.npmmirror.com
    name: abcdeploy-build-candidate
    runner:
      cpus: 4
      tags: cnb:arch:amd64
    services:
    - docker
    stages:
    - name: 准备安全部署工具
      script:
      - apt-get update && apt-get install -y --no-install-recommends ca-certificates git openssh-client && rm -rf /var/lib/apt/lists/*
    - name: 安装依赖
      script:
      - command -v corepack >/dev/null 2>&1 && corepack enable || true
      - corepack pnpm install --frozen-lockfile
    - name: 验证 1
      script:
      - corepack pnpm build
    - name: 登录临时构建仓库
      script:
      - |-
        test -n "${CNB_TOKEN:-}"
        printf '%s' "$CNB_TOKEN" | docker login docker.cnb.cool --username "${CNB_USERNAME:-cnb}" --password-stdin
    - name: 构建 api
      script:
      - |-
        IMAGE_TAG="sha-${CNB_COMMIT}"
        IMAGE_REFERENCE='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-api':$IMAGE_TAG
        docker build --file 'apps/api/Dockerfile' --tag "$IMAGE_REFERENCE" '.'
        docker push "$IMAGE_REFERENCE"
    - name: 构建 web
      script:
      - |-
        IMAGE_TAG="sha-${CNB_COMMIT}"
        IMAGE_REFERENCE='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-web':$IMAGE_TAG
        docker build --file 'apps/web/Dockerfile' --tag "$IMAGE_REFERENCE" '.'
        docker push "$IMAGE_REFERENCE"
  api_trigger_production:
  - docker:
      image: node:22-slim
    env:
      COREPACK_NPM_REGISTRY: https://registry.npmmirror.com
      DEPLOYDESK_ENV: production
      NO_PROXY: registry.npmmirror.com
      no_proxy: registry.npmmirror.com
      npm_config_registry: https://registry.npmmirror.com
    imports:
    - https://cnb.cool/replace-me/secret/-/blob/main/env.production.yml
    name: deploydesk-production-approved
    runner:
      cpus: 4
      tags: cnb:arch:amd64
    services:
    - docker
    stages:
    - name: 准备安全部署工具
      script:
      - apt-get update && apt-get install -y --no-install-recommends ca-certificates git openssh-client && rm -rf /var/lib/apt/lists/*
    - name: 登录镜像仓库
      script:
      - |-
        test -n "$CNB_TOKEN"
        printf '%s' "$CNB_TOKEN" | docker login docker.cnb.cool --username "${CNB_USERNAME:-cnb}" --password-stdin
    - name: 按已验证摘要部署生产环境
      script:
      - |-
        set -eu
        IMAGE_TAG="sha-${CNB_COMMIT}"
        RELEASE_TAG="verified-${IMAGE_TAG}"
        RUNTIME_DIRECTORY='.deploydesk/runtime/production'
        rm -rf "$RUNTIME_DIRECTORY"
        install -d -m 700 "$RUNTIME_DIRECTORY"
        node <<'DEPLOYDESK_NODE'
        const fs = require("node:fs");
        const variables = [{"name":"API_GREETING","source":"PRODUCTION_API_GREETING","required":true,"default":null},{"name":"VITE_API_BASE_URL","source":"PRODUCTION_VITE_API_BASE_URL","required":true,"default":null}];
        const outputPath = ".deploydesk/runtime/production/.runtime.env";
        const runtimeFileSource = "PRODUCTION_RUNTIME_ENV_FILE";
        const runtimeFile = process.env[runtimeFileSource];
        if (runtimeFile) {
          if (runtimeFile.includes("\0")) {
            console.error(`密钥仓库字段 ${runtimeFileSource} 包含无效字符`);
            process.exit(1);
          }
          const configured = new Map();
          for (const line of runtimeFile.split(/\r?\n/)) {
            const normalized = line.trimStart().replace(/^export\s+/, "");
            const equals = normalized.indexOf("=");
            if (equals <= 0) continue;
            const name = normalized.slice(0, equals).trim();
            if (!/^[A-Z_][A-Z0-9_]*$/.test(name)) continue;
            const value = normalized.slice(equals + 1).trim();
            const present = value !== "" && value !== "\"\"" && value !== String.fromCharCode(39, 39);
            configured.set(name, present);
          }
          const missing = variables
            .filter((variable) => variable.required && !configured.get(variable.name))
            .map((variable) => variable.name);
          if (missing.length) {
            console.error(`缺少密钥仓库字段：${missing.join(", ")}`);
            process.exit(1);
          }
          const content = runtimeFile.endsWith("\n") ? runtimeFile : `${runtimeFile}\n`;
          fs.writeFileSync(outputPath, content, { mode: 0o600 });
        } else {
          const lines = ["DEPLOYDESK_ENV=production"];
          const missing = [];
          for (const variable of variables) {
            const configured = Object.prototype.hasOwnProperty.call(process.env, variable.source);
            const value = configured ? process.env[variable.source] : (variable.default ?? "");
            if (variable.required && !value) missing.push(variable.source);
            if (/\r|\n/.test(value)) {
              console.error(`密钥仓库字段 ${variable.source} 不支持换行值`);
              process.exit(1);
            }
            lines.push(`${variable.name}=${JSON.stringify(value)}`);
          }
          if (missing.length) {
            console.error(`缺少密钥仓库字段：${missing.join(", ")}`);
            process.exit(1);
          }
          fs.writeFileSync(outputPath, `${lines.join("\n")}\n`, { mode: 0o600 });
        }
        DEPLOYDESK_NODE
        DEPLOYDESK_API_IMAGE_PUSH_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-api'
        DEPLOYDESK_API_IMAGE_PULL_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-api'
        DEPLOYDESK_API_IMAGE_DIGEST="$(docker buildx imagetools inspect "${DEPLOYDESK_API_IMAGE_PUSH_REPOSITORY}:${RELEASE_TAG}" | awk '$1 == "Digest:" && $2 ~ /^sha256:/ { print $2; exit }')"
        case "${DEPLOYDESK_API_IMAGE_DIGEST}" in sha256:*) ;; *) echo '服务 api 的镜像摘要无效' >&2; exit 1 ;; esac
        DEPLOYDESK_API_IMAGE="${DEPLOYDESK_API_IMAGE_PULL_REPOSITORY}@${DEPLOYDESK_API_IMAGE_DIGEST}"
        DEPLOYDESK_WEB_IMAGE_PUSH_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-web'
        DEPLOYDESK_WEB_IMAGE_PULL_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-web'
        DEPLOYDESK_WEB_IMAGE_DIGEST="$(docker buildx imagetools inspect "${DEPLOYDESK_WEB_IMAGE_PUSH_REPOSITORY}:${RELEASE_TAG}" | awk '$1 == "Digest:" && $2 ~ /^sha256:/ { print $2; exit }')"
        case "${DEPLOYDESK_WEB_IMAGE_DIGEST}" in sha256:*) ;; *) echo '服务 web 的镜像摘要无效' >&2; exit 1 ;; esac
        DEPLOYDESK_WEB_IMAGE="${DEPLOYDESK_WEB_IMAGE_PULL_REPOSITORY}@${DEPLOYDESK_WEB_IMAGE_DIGEST}"
        {
          printf 'DEPLOYDESK_RELEASE_ID=%s\n' "$RELEASE_TAG"
          printf 'DEPLOYDESK_API_IMAGE=%s\n' "${DEPLOYDESK_API_IMAGE}"
          printf 'DEPLOYDESK_WEB_IMAGE=%s\n' "${DEPLOYDESK_WEB_IMAGE}"
        } > "$RUNTIME_DIRECTORY/.release.env"
        chmod 600 "$RUNTIME_DIRECTORY/.release.env"
        SERVER_HOST="${PRODUCTION_SERVER_HOST:-}"
        SERVER_PORT="${PRODUCTION_SERVER_PORT:-22}"
        SERVER_USER="${PRODUCTION_SERVER_USER:-}"
        SERVER_SSH_KEY="${PRODUCTION_SERVER_SSH_KEY:-}"
        SERVER_KNOWN_HOSTS="${PRODUCTION_SERVER_KNOWN_HOSTS:-}"
        test -n "$SERVER_HOST" || { echo '缺少目标环境的 SERVER_HOST' >&2; exit 1; }
        test -n "$SERVER_USER" || { echo '缺少目标环境的 SERVER_USER' >&2; exit 1; }
        test -n "$SERVER_SSH_KEY" || { echo '缺少目标环境的 SERVER_SSH_KEY' >&2; exit 1; }
        test -n "$SERVER_KNOWN_HOSTS" || { echo '缺少已确认的 SERVER_KNOWN_HOSTS' >&2; exit 1; }
        case "$SERVER_PORT" in ''|*[!0-9]*) echo 'SSH 端口格式不正确' >&2; exit 1 ;; esac
        SSH_KEY_FILE="$RUNTIME_DIRECTORY/deploydesk_key"
        KNOWN_HOSTS_FILE="$RUNTIME_DIRECTORY/known_hosts"
        printf '%s\n' "$SERVER_SSH_KEY" > "$SSH_KEY_FILE"
        printf '%s\n' "$SERVER_KNOWN_HOSTS" > "$KNOWN_HOSTS_FILE"
        chmod 600 "$SSH_KEY_FILE" "$KNOWN_HOSTS_FILE"
        DESTINATION="$SERVER_USER@$SERVER_HOST"
        ssh -i "$SSH_KEY_FILE" -p "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$DESTINATION" 'set -eu
        mkdir -p '"'"'.deploydesk/apps/abcdeploy-hello-fullstack/production'"'"' "$HOME/.deploydesk/caddy/sites"
        docker network inspect '"'"'deploydesk-abcdeploy-hello-fullstack-production'"'"' >/dev/null 2>&1 || docker network create '"'"'deploydesk-abcdeploy-hello-fullstack-production'"'"' >/dev/null'
        printf '%s' "$CNB_TOKEN" | ssh -i "$SSH_KEY_FILE" -p "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$DESTINATION" 'docker login docker.cnb.cool --username cnb --password-stdin'
        scp -i "$SSH_KEY_FILE" -P "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" '.deploydesk/generated/production/docker-compose.yml' "$DESTINATION:.deploydesk/apps/abcdeploy-hello-fullstack/production/docker-compose.yml.next"
        scp -i "$SSH_KEY_FILE" -P "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" '.deploydesk/generated/production/Caddyfile' "$DESTINATION:.deploydesk/apps/abcdeploy-hello-fullstack/production/Caddyfile.next"
        scp -i "$SSH_KEY_FILE" -P "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$RUNTIME_DIRECTORY/.runtime.env" "$DESTINATION:.deploydesk/apps/abcdeploy-hello-fullstack/production/.runtime.env.next"
        scp -i "$SSH_KEY_FILE" -P "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$RUNTIME_DIRECTORY/.release.env" "$DESTINATION:.deploydesk/apps/abcdeploy-hello-fullstack/production/.release.env.next"
        ssh -i "$SSH_KEY_FILE" -p "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$DESTINATION" 'set -eu
        mkdir -p "$HOME/.deploydesk/locks"
        exec 9>"$HOME/.deploydesk/locks/server-deploy.lock"
        flock -w 900 9 || { echo '"'"'同一服务器已有部署任务，等待超时'"'"' >&2; exit 75; }
        cd '"'"'.deploydesk/apps/abcdeploy-hello-fullstack/production'"'"'
        minimum_free_kb=5242880
        available_kb="$(df -Pk . | awk '"'"'NR == 2 { print $4 }'"'"')"
        case "$available_kb" in '"'"''"'"'|*[!0-9]*) echo '"'"'AD-SRV-208：无法读取服务器剩余磁盘空间'"'"' >&2; exit 1 ;; esac
        if [ "$available_kb" -lt "$minimum_free_kb" ]; then
          docker image prune -a -f >/dev/null 2>&1 || true
          available_kb="$(df -Pk . | awk '"'"'NR == 2 { print $4 }'"'"')"
        fi
        if [ "$available_kb" -lt "$minimum_free_kb" ]; then
          echo '"'"'AD-SRV-208：服务器可用磁盘空间不足 5GB，已安全清理未使用镜像但仍不足'"'"' >&2
          exit 1
        fi
        PERSISTED_RUNTIME_FILE="$HOME/.deploydesk/runtime-config/abcdeploy-hello-fullstack/production.env"
        if [ -s "$PERSISTED_RUNTIME_FILE" ]; then
          cp "$PERSISTED_RUNTIME_FILE" .runtime.env.next
        fi
        backup_file() {
          if [ -f "$1" ]; then
            cp "$1" "$1.previous.next"
            mv -f "$1.previous.next" "$1.previous"
          else
            rm -f "$1.previous" "$1.previous.next"
          fi
        }
        restore_previous() {
          for file in docker-compose.yml .runtime.env .release.env Caddyfile; do
            if [ -f "$file.previous" ]; then mv -f "$file.previous" "$file"; fi
          done
        }
        for file in docker-compose.yml .runtime.env .release.env Caddyfile; do
          test -f "$file.next"
          backup_file "$file"
          mv "$file.next" "$file"
        done
        chmod 600 .runtime.env .release.env
        release_id="$(sed -n '"'"'s/^DEPLOYDESK_RELEASE_ID=//p'"'"' .release.env | head -n 1)"
        case "$release_id" in '"'"''"'"'|*[!A-Za-z0-9._-]*) echo '"'"'发布记录标识无效'"'"' >&2; exit 1 ;; esac
        if docker compose --env-file .release.env -f docker-compose.yml config --quiet && \
           docker compose --env-file .release.env -f docker-compose.yml pull && \
           docker compose --env-file .release.env -f docker-compose.yml up -d --remove-orphans --force-recreate --wait --wait-timeout 180; then
          :
        else
          deploy_status=$?
          if [ "true" = "true" ] && [ -f .release.env.previous ]; then
            restore_previous
            docker compose --env-file .release.env -f docker-compose.yml pull || true
            docker compose --env-file .release.env -f docker-compose.yml up -d --remove-orphans --force-recreate --wait --wait-timeout 180 || true
          fi
          exit "$deploy_status"
        fi
        mkdir -p .history "$HOME/.deploydesk/caddy/sites"
        cp .release.env ".history/$release_id.env"
        old_releases="$(ls -1t .history/*.env 2>/dev/null | tail -n +6 || true)"
        if [ -n "$old_releases" ]; then printf '"'"'%s\n'"'"' "$old_releases" | xargs rm -f; fi
        if [ "0" = 1 ]; then
        CADDY_CONTAINER="$(cat "$HOME/.deploydesk/caddy/container-name" 2>/dev/null || printf '"'"'deploydesk-caddy'"'"')"
        CADDY_SITE_DIRECTORY="$(cat "$HOME/.deploydesk/caddy/site-directory" 2>/dev/null || printf '"'"'%s'"'"' "$HOME/.deploydesk/caddy/sites")"
        case "$CADDY_CONTAINER" in '"'"''"'"'|*[!A-Za-z0-9_.-]*) echo '"'"'AD-SRV-205：Caddy 容器记录无效'"'"' >&2; exit 1 ;; esac
        case "$CADDY_SITE_DIRECTORY" in /*) ;; *) echo '"'"'AD-SRV-205：Caddy 路由目录记录无效'"'"' >&2; exit 1 ;; esac
        test -d "$CADDY_SITE_DIRECTORY" && test -w "$CADDY_SITE_DIRECTORY" || { echo '"'"'AD-SRV-205：Caddy 路由目录不可写'"'"' >&2; exit 1; }
        SITE_FILE="$CADDY_SITE_DIRECTORY/abcdeploy-hello-fullstack-production.caddy"
        if docker inspect "$CADDY_CONTAINER" >/dev/null 2>&1; then
          if ! docker network inspect '"'"'deploydesk-abcdeploy-hello-fullstack-production'"'"' --format '"'"'{{range .Containers}}{{println .Name}}{{end}}'"'"' | grep -Fx -- "$CADDY_CONTAINER" >/dev/null; then
            if ! docker network connect '"'"'deploydesk-abcdeploy-hello-fullstack-production'"'"' "$CADDY_CONTAINER"; then
              echo '"'"'AD-SRV-211：统一 Caddy 无法加入当前项目网络，未加载访问地址'"'"' >&2
              exit 1
            fi
          fi
          if ! docker network inspect '"'"'deploydesk-abcdeploy-hello-fullstack-production'"'"' --format '"'"'{{range .Containers}}{{println .Name}}{{end}}'"'"' | grep -Fx -- "$CADDY_CONTAINER" >/dev/null; then
            echo '"'"'AD-SRV-211：统一 Caddy 尚未连接当前项目网络，未加载访问地址'"'"' >&2
            exit 1
          fi
          ROUTE_WORK_DIR="$(mktemp -d "$HOME/.deploydesk/caddy/activate.XXXXXX")"
          trap '"'"'rm -rf "$ROUTE_WORK_DIR"'"'"' EXIT
          CANDIDATE_FILE="$PWD/Caddyfile"
          FILTERED_SITE_FILE="$ROUTE_WORK_DIR/Caddyfile.filtered"
          MAIN_CONFIG_FILE="$ROUTE_WORK_DIR/Caddyfile.main"
          ROUTE_CONFLICTS_FILE="$ROUTE_WORK_DIR/conflicts"
          FILTER_HOSTS_FILE="$ROUTE_WORK_DIR/filter-hosts"
          docker exec "$CADDY_CONTAINER" cat /etc/caddy/Caddyfile >"$MAIN_CONFIG_FILE" || { echo '"'"'AD-SRV-205：无法读取统一 Caddy 主配置'"'"' >&2; exit 1; }
        : >"$ROUTE_CONFLICTS_FILE"
        route_declared_in_file() {
          awk -v host="$1" '"'"'
            BEGIN {
              target=tolower(host);
              sub(/^https?:\/\//, "", target);
              sub(/:(80|443)$/, "", target);
              sub(/\.$/, "", target);
              depth=0;
            }
            {
              open_line=$0;
              close_line=$0;
              opens=gsub(/\{/, "{", open_line);
              closes=gsub(/\}/, "}", close_line);
              if (depth == 0 && index($0, "{") > 0) {
                header=$0;
                sub(/\{.*/, "", header);
                gsub(/[[:space:]]/, "", header);
                count=split(header, labels, ",");
                for (i=1; i<=count; i++) {
                  candidate=tolower(labels[i]);
                  sub(/^https?:\/\//, "", candidate);
                  sub(/:(80|443)$/, "", candidate);
                  sub(/\.$/, "", candidate);
                  if (candidate == target) found=1;
                }
              }
              depth += opens - closes;
            }
            END { exit found ? 0 : 1 }
          '"'"' "$2"
        }
        for host in ; do
          if route_declared_in_file "$host" "$MAIN_CONFIG_FILE"; then
            printf '"'"'%s\tmain\n'"'"' "$host" >>"$ROUTE_CONFLICTS_FILE"
            continue
          fi
          for file in "$CADDY_SITE_DIRECTORY"/*.caddy; do
            [ -f "$file" ] || continue
            [ "$file" = "$SITE_FILE" ] && continue
            if route_declared_in_file "$host" "$file"; then
              printf '"'"'%s\tmanaged\n'"'"' "$host" >>"$ROUTE_CONFLICTS_FILE"
              break
            fi
          done
        done
        if awk -F '"'"'\t'"'"' '"'"'$2 == "managed" { found=1 } END { exit found ? 0 : 1 }'"'"' "$ROUTE_CONFLICTS_FILE"; then
          managed_hosts="$(awk -F '"'"'\t'"'"' '"'"'$2 == "managed" { print $1 }'"'"' "$ROUTE_CONFLICTS_FILE" | paste -sd '"'"','"'"' -)"
          echo "AD-SRV-210：$managed_hosts 已由另一个项目管理，请先调整正式地址" >&2
          exit 1
        fi
        awk -F '"'"'\t'"'"' '"'"'$2 == "main" { print $1 }'"'"' "$ROUTE_CONFLICTS_FILE" >"$FILTER_HOSTS_FILE"
        awk -v hosts_file="$FILTER_HOSTS_FILE" '"'"'
          function normalize(value, normalized) {
            normalized=tolower(value);
            sub(/^https?:\/\//, "", normalized);
            sub(/:(80|443)$/, "", normalized);
            sub(/\.$/, "", normalized);
            return normalized;
          }
          BEGIN {
            while ((getline host < hosts_file) > 0) targets[normalize(host)]=1;
            close(hosts_file);
            depth=0;
            skip=0;
          }
          {
            open_line=$0;
            close_line=$0;
            opens=gsub(/\{/, "{", open_line);
            closes=gsub(/\}/, "}", close_line);
            if (!skip && depth == 0 && index($0, "{") > 0) {
              header=$0;
              sub(/\{.*/, "", header);
              gsub(/[[:space:]]/, "", header);
              count=split(header, labels, ",");
              for (i=1; i<=count; i++) {
                site_host=tolower(labels[i]);
                sub(/^https?:\/\//, "", site_host);
                sub(/:(80|443)$/, "", site_host);
                sub(/\.$/, "", site_host);
                if (targets[site_host]) skip=1;
              }
            }
            if (!skip) print;
            depth += opens - closes;
            if (skip && depth == 0) skip=0;
          }
        '"'"' "$CANDIDATE_FILE" >"$FILTERED_SITE_FILE"

          if [ -f "$SITE_FILE" ]; then cp "$SITE_FILE" "$SITE_FILE.previous"; else rm -f "$SITE_FILE.previous"; fi
          cp "$FILTERED_SITE_FILE" "$SITE_FILE"
          if ! docker exec "$CADDY_CONTAINER" caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile; then
            if [ -f "$SITE_FILE.previous" ]; then cp "$SITE_FILE.previous" "$SITE_FILE"; else rm -f "$SITE_FILE"; fi
            echo '"'"'AD-SRV-209：未冲突地址的配置校验失败，已恢复原路由'"'"' >&2
            exit 1
          fi
          if ! docker exec "$CADDY_CONTAINER" caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile; then
            if [ -f "$SITE_FILE.previous" ]; then cp "$SITE_FILE.previous" "$SITE_FILE"; else rm -f "$SITE_FILE"; fi
            docker exec "$CADDY_CONTAINER" caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile >/dev/null 2>&1 || true
            echo '"'"'AD-SRV-207：Caddy 重载失败，已恢复原路由'"'"' >&2
            exit 1
          fi
          while IFS="$(printf '"'"'\t'"'"')" read -r host source; do
            if [ "$source" = "main" ]; then
              printf '"'"'ROUTE_TAKEOVER_REQUIRED\t%s\n'"'"' "$host"
            fi
          done <"$ROUTE_CONFLICTS_FILE"
        else
          if [ -f "$SITE_FILE" ]; then cp "$SITE_FILE" "$SITE_FILE.previous"; else rm -f "$SITE_FILE.previous"; fi
          cp Caddyfile "$SITE_FILE"
          echo '"'"'ROUTE_PENDING: AD-SRV-203：应用已健康运行，但统一 Caddy 当前未运行。'"'"'
        fi
        fi'
  api_trigger_staging:
  - docker:
      image: node:22-slim
    env:
      COREPACK_NPM_REGISTRY: https://registry.npmmirror.com
      DEPLOYDESK_ENV: staging
      NO_PROXY: registry.npmmirror.com
      no_proxy: registry.npmmirror.com
      npm_config_registry: https://registry.npmmirror.com
    imports:
    - https://cnb.cool/replace-me/secret/-/blob/main/env.staging.yml
    name: deploydesk-release-candidate
    runner:
      cpus: 4
      tags: cnb:arch:amd64
    services:
    - docker
    stages:
    - name: 准备安全部署工具
      script:
      - apt-get update && apt-get install -y --no-install-recommends ca-certificates git openssh-client && rm -rf /var/lib/apt/lists/*
    - name: 安装依赖
      script:
      - corepack enable
      - corepack pnpm install --frozen-lockfile
    - name: 验证 1
      script:
      - corepack pnpm build
    - name: 登录镜像仓库
      script:
      - |-
        test -n "$CNB_TOKEN"
        printf '%s' "$CNB_TOKEN" | docker login docker.cnb.cool --username "${CNB_USERNAME:-cnb}" --password-stdin
    - name: 构建并上传 api
      script:
      - |-
        IMAGE_TAG="sha-${CNB_COMMIT}"
        IMAGE_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-api'
        IMAGE_REFERENCE="${IMAGE_REPOSITORY}:${IMAGE_TAG}"
        docker build --file 'apps/api/Dockerfile' --tag "$IMAGE_REFERENCE" '.'
        docker push "$IMAGE_REFERENCE"
    - name: 构建并上传 web
      script:
      - |-
        IMAGE_TAG="sha-${CNB_COMMIT}"
        IMAGE_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-web'
        IMAGE_REFERENCE="${IMAGE_REPOSITORY}:${IMAGE_TAG}"
        docker build --file 'apps/web/Dockerfile' --tag "$IMAGE_REFERENCE" '.'
        docker push "$IMAGE_REFERENCE"
    - name: 在测试环境验证生产候选
      script:
      - |-
        set -eu
        IMAGE_TAG="sha-${CNB_COMMIT}"
        RELEASE_TAG="$IMAGE_TAG"
        RUNTIME_DIRECTORY='.deploydesk/runtime/staging'
        rm -rf "$RUNTIME_DIRECTORY"
        install -d -m 700 "$RUNTIME_DIRECTORY"
        node <<'DEPLOYDESK_NODE'
        const fs = require("node:fs");
        const variables = [{"name":"API_GREETING","source":"STAGING_API_GREETING","required":true,"default":null},{"name":"VITE_API_BASE_URL","source":"STAGING_VITE_API_BASE_URL","required":true,"default":null}];
        const outputPath = ".deploydesk/runtime/staging/.runtime.env";
        const runtimeFileSource = "STAGING_RUNTIME_ENV_FILE";
        const runtimeFile = process.env[runtimeFileSource];
        if (runtimeFile) {
          if (runtimeFile.includes("\0")) {
            console.error(`密钥仓库字段 ${runtimeFileSource} 包含无效字符`);
            process.exit(1);
          }
          const configured = new Map();
          for (const line of runtimeFile.split(/\r?\n/)) {
            const normalized = line.trimStart().replace(/^export\s+/, "");
            const equals = normalized.indexOf("=");
            if (equals <= 0) continue;
            const name = normalized.slice(0, equals).trim();
            if (!/^[A-Z_][A-Z0-9_]*$/.test(name)) continue;
            const value = normalized.slice(equals + 1).trim();
            const present = value !== "" && value !== "\"\"" && value !== String.fromCharCode(39, 39);
            configured.set(name, present);
          }
          const missing = variables
            .filter((variable) => variable.required && !configured.get(variable.name))
            .map((variable) => variable.name);
          if (missing.length) {
            console.error(`缺少密钥仓库字段：${missing.join(", ")}`);
            process.exit(1);
          }
          const content = runtimeFile.endsWith("\n") ? runtimeFile : `${runtimeFile}\n`;
          fs.writeFileSync(outputPath, content, { mode: 0o600 });
        } else {
          const lines = ["DEPLOYDESK_ENV=staging"];
          const missing = [];
          for (const variable of variables) {
            const configured = Object.prototype.hasOwnProperty.call(process.env, variable.source);
            const value = configured ? process.env[variable.source] : (variable.default ?? "");
            if (variable.required && !value) missing.push(variable.source);
            if (/\r|\n/.test(value)) {
              console.error(`密钥仓库字段 ${variable.source} 不支持换行值`);
              process.exit(1);
            }
            lines.push(`${variable.name}=${JSON.stringify(value)}`);
          }
          if (missing.length) {
            console.error(`缺少密钥仓库字段：${missing.join(", ")}`);
            process.exit(1);
          }
          fs.writeFileSync(outputPath, `${lines.join("\n")}\n`, { mode: 0o600 });
        }
        DEPLOYDESK_NODE
        DEPLOYDESK_API_IMAGE_PUSH_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-api'
        DEPLOYDESK_API_IMAGE_PULL_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-api'
        DEPLOYDESK_API_IMAGE_DIGEST="$(docker buildx imagetools inspect "${DEPLOYDESK_API_IMAGE_PUSH_REPOSITORY}:${RELEASE_TAG}" | awk '$1 == "Digest:" && $2 ~ /^sha256:/ { print $2; exit }')"
        case "${DEPLOYDESK_API_IMAGE_DIGEST}" in sha256:*) ;; *) echo '服务 api 的镜像摘要无效' >&2; exit 1 ;; esac
        DEPLOYDESK_API_IMAGE="${DEPLOYDESK_API_IMAGE_PULL_REPOSITORY}@${DEPLOYDESK_API_IMAGE_DIGEST}"
        DEPLOYDESK_WEB_IMAGE_PUSH_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-web'
        DEPLOYDESK_WEB_IMAGE_PULL_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-web'
        DEPLOYDESK_WEB_IMAGE_DIGEST="$(docker buildx imagetools inspect "${DEPLOYDESK_WEB_IMAGE_PUSH_REPOSITORY}:${RELEASE_TAG}" | awk '$1 == "Digest:" && $2 ~ /^sha256:/ { print $2; exit }')"
        case "${DEPLOYDESK_WEB_IMAGE_DIGEST}" in sha256:*) ;; *) echo '服务 web 的镜像摘要无效' >&2; exit 1 ;; esac
        DEPLOYDESK_WEB_IMAGE="${DEPLOYDESK_WEB_IMAGE_PULL_REPOSITORY}@${DEPLOYDESK_WEB_IMAGE_DIGEST}"
        {
          printf 'DEPLOYDESK_RELEASE_ID=%s\n' "$RELEASE_TAG"
          printf 'DEPLOYDESK_API_IMAGE=%s\n' "${DEPLOYDESK_API_IMAGE}"
          printf 'DEPLOYDESK_WEB_IMAGE=%s\n' "${DEPLOYDESK_WEB_IMAGE}"
        } > "$RUNTIME_DIRECTORY/.release.env"
        chmod 600 "$RUNTIME_DIRECTORY/.release.env"
        SERVER_HOST="${STAGING_SERVER_HOST:-}"
        SERVER_PORT="${STAGING_SERVER_PORT:-22}"
        SERVER_USER="${STAGING_SERVER_USER:-}"
        SERVER_SSH_KEY="${STAGING_SERVER_SSH_KEY:-}"
        SERVER_KNOWN_HOSTS="${STAGING_SERVER_KNOWN_HOSTS:-}"
        test -n "$SERVER_HOST" || { echo '缺少目标环境的 SERVER_HOST' >&2; exit 1; }
        test -n "$SERVER_USER" || { echo '缺少目标环境的 SERVER_USER' >&2; exit 1; }
        test -n "$SERVER_SSH_KEY" || { echo '缺少目标环境的 SERVER_SSH_KEY' >&2; exit 1; }
        test -n "$SERVER_KNOWN_HOSTS" || { echo '缺少已确认的 SERVER_KNOWN_HOSTS' >&2; exit 1; }
        case "$SERVER_PORT" in ''|*[!0-9]*) echo 'SSH 端口格式不正确' >&2; exit 1 ;; esac
        SSH_KEY_FILE="$RUNTIME_DIRECTORY/deploydesk_key"
        KNOWN_HOSTS_FILE="$RUNTIME_DIRECTORY/known_hosts"
        printf '%s\n' "$SERVER_SSH_KEY" > "$SSH_KEY_FILE"
        printf '%s\n' "$SERVER_KNOWN_HOSTS" > "$KNOWN_HOSTS_FILE"
        chmod 600 "$SSH_KEY_FILE" "$KNOWN_HOSTS_FILE"
        DESTINATION="$SERVER_USER@$SERVER_HOST"
        ssh -i "$SSH_KEY_FILE" -p "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$DESTINATION" 'set -eu
        mkdir -p '"'"'.deploydesk/apps/abcdeploy-hello-fullstack/staging'"'"' "$HOME/.deploydesk/caddy/sites"
        docker network inspect '"'"'deploydesk-abcdeploy-hello-fullstack-staging'"'"' >/dev/null 2>&1 || docker network create '"'"'deploydesk-abcdeploy-hello-fullstack-staging'"'"' >/dev/null'
        printf '%s' "$CNB_TOKEN" | ssh -i "$SSH_KEY_FILE" -p "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$DESTINATION" 'docker login docker.cnb.cool --username cnb --password-stdin'
        scp -i "$SSH_KEY_FILE" -P "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" '.deploydesk/generated/staging/docker-compose.yml' "$DESTINATION:.deploydesk/apps/abcdeploy-hello-fullstack/staging/docker-compose.yml.next"
        scp -i "$SSH_KEY_FILE" -P "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" '.deploydesk/generated/staging/Caddyfile' "$DESTINATION:.deploydesk/apps/abcdeploy-hello-fullstack/staging/Caddyfile.next"
        scp -i "$SSH_KEY_FILE" -P "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$RUNTIME_DIRECTORY/.runtime.env" "$DESTINATION:.deploydesk/apps/abcdeploy-hello-fullstack/staging/.runtime.env.next"
        scp -i "$SSH_KEY_FILE" -P "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$RUNTIME_DIRECTORY/.release.env" "$DESTINATION:.deploydesk/apps/abcdeploy-hello-fullstack/staging/.release.env.next"
        ssh -i "$SSH_KEY_FILE" -p "$SERVER_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" "$DESTINATION" 'set -eu
        mkdir -p "$HOME/.deploydesk/locks"
        exec 9>"$HOME/.deploydesk/locks/server-deploy.lock"
        flock -w 900 9 || { echo '"'"'同一服务器已有部署任务，等待超时'"'"' >&2; exit 75; }
        cd '"'"'.deploydesk/apps/abcdeploy-hello-fullstack/staging'"'"'
        minimum_free_kb=5242880
        available_kb="$(df -Pk . | awk '"'"'NR == 2 { print $4 }'"'"')"
        case "$available_kb" in '"'"''"'"'|*[!0-9]*) echo '"'"'AD-SRV-208：无法读取服务器剩余磁盘空间'"'"' >&2; exit 1 ;; esac
        if [ "$available_kb" -lt "$minimum_free_kb" ]; then
          docker image prune -a -f >/dev/null 2>&1 || true
          available_kb="$(df -Pk . | awk '"'"'NR == 2 { print $4 }'"'"')"
        fi
        if [ "$available_kb" -lt "$minimum_free_kb" ]; then
          echo '"'"'AD-SRV-208：服务器可用磁盘空间不足 5GB，已安全清理未使用镜像但仍不足'"'"' >&2
          exit 1
        fi
        PERSISTED_RUNTIME_FILE="$HOME/.deploydesk/runtime-config/abcdeploy-hello-fullstack/staging.env"
        if [ -s "$PERSISTED_RUNTIME_FILE" ]; then
          cp "$PERSISTED_RUNTIME_FILE" .runtime.env.next
        fi
        backup_file() {
          if [ -f "$1" ]; then
            cp "$1" "$1.previous.next"
            mv -f "$1.previous.next" "$1.previous"
          else
            rm -f "$1.previous" "$1.previous.next"
          fi
        }
        restore_previous() {
          for file in docker-compose.yml .runtime.env .release.env Caddyfile; do
            if [ -f "$file.previous" ]; then mv -f "$file.previous" "$file"; fi
          done
        }
        for file in docker-compose.yml .runtime.env .release.env Caddyfile; do
          test -f "$file.next"
          backup_file "$file"
          mv "$file.next" "$file"
        done
        chmod 600 .runtime.env .release.env
        release_id="$(sed -n '"'"'s/^DEPLOYDESK_RELEASE_ID=//p'"'"' .release.env | head -n 1)"
        case "$release_id" in '"'"''"'"'|*[!A-Za-z0-9._-]*) echo '"'"'发布记录标识无效'"'"' >&2; exit 1 ;; esac
        if docker compose --env-file .release.env -f docker-compose.yml config --quiet && \
           docker compose --env-file .release.env -f docker-compose.yml pull && \
           docker compose --env-file .release.env -f docker-compose.yml up -d --remove-orphans --force-recreate --wait --wait-timeout 180; then
          :
        else
          deploy_status=$?
          if [ "true" = "true" ] && [ -f .release.env.previous ]; then
            restore_previous
            docker compose --env-file .release.env -f docker-compose.yml pull || true
            docker compose --env-file .release.env -f docker-compose.yml up -d --remove-orphans --force-recreate --wait --wait-timeout 180 || true
          fi
          exit "$deploy_status"
        fi
        mkdir -p .history "$HOME/.deploydesk/caddy/sites"
        cp .release.env ".history/$release_id.env"
        old_releases="$(ls -1t .history/*.env 2>/dev/null | tail -n +6 || true)"
        if [ -n "$old_releases" ]; then printf '"'"'%s\n'"'"' "$old_releases" | xargs rm -f; fi
        if [ "0" = 1 ]; then
        CADDY_CONTAINER="$(cat "$HOME/.deploydesk/caddy/container-name" 2>/dev/null || printf '"'"'deploydesk-caddy'"'"')"
        CADDY_SITE_DIRECTORY="$(cat "$HOME/.deploydesk/caddy/site-directory" 2>/dev/null || printf '"'"'%s'"'"' "$HOME/.deploydesk/caddy/sites")"
        case "$CADDY_CONTAINER" in '"'"''"'"'|*[!A-Za-z0-9_.-]*) echo '"'"'AD-SRV-205：Caddy 容器记录无效'"'"' >&2; exit 1 ;; esac
        case "$CADDY_SITE_DIRECTORY" in /*) ;; *) echo '"'"'AD-SRV-205：Caddy 路由目录记录无效'"'"' >&2; exit 1 ;; esac
        test -d "$CADDY_SITE_DIRECTORY" && test -w "$CADDY_SITE_DIRECTORY" || { echo '"'"'AD-SRV-205：Caddy 路由目录不可写'"'"' >&2; exit 1; }
        SITE_FILE="$CADDY_SITE_DIRECTORY/abcdeploy-hello-fullstack-staging.caddy"
        if docker inspect "$CADDY_CONTAINER" >/dev/null 2>&1; then
          if ! docker network inspect '"'"'deploydesk-abcdeploy-hello-fullstack-staging'"'"' --format '"'"'{{range .Containers}}{{println .Name}}{{end}}'"'"' | grep -Fx -- "$CADDY_CONTAINER" >/dev/null; then
            if ! docker network connect '"'"'deploydesk-abcdeploy-hello-fullstack-staging'"'"' "$CADDY_CONTAINER"; then
              echo '"'"'AD-SRV-211：统一 Caddy 无法加入当前项目网络，未加载访问地址'"'"' >&2
              exit 1
            fi
          fi
          if ! docker network inspect '"'"'deploydesk-abcdeploy-hello-fullstack-staging'"'"' --format '"'"'{{range .Containers}}{{println .Name}}{{end}}'"'"' | grep -Fx -- "$CADDY_CONTAINER" >/dev/null; then
            echo '"'"'AD-SRV-211：统一 Caddy 尚未连接当前项目网络，未加载访问地址'"'"' >&2
            exit 1
          fi
          ROUTE_WORK_DIR="$(mktemp -d "$HOME/.deploydesk/caddy/activate.XXXXXX")"
          trap '"'"'rm -rf "$ROUTE_WORK_DIR"'"'"' EXIT
          CANDIDATE_FILE="$PWD/Caddyfile"
          FILTERED_SITE_FILE="$ROUTE_WORK_DIR/Caddyfile.filtered"
          MAIN_CONFIG_FILE="$ROUTE_WORK_DIR/Caddyfile.main"
          ROUTE_CONFLICTS_FILE="$ROUTE_WORK_DIR/conflicts"
          FILTER_HOSTS_FILE="$ROUTE_WORK_DIR/filter-hosts"
          docker exec "$CADDY_CONTAINER" cat /etc/caddy/Caddyfile >"$MAIN_CONFIG_FILE" || { echo '"'"'AD-SRV-205：无法读取统一 Caddy 主配置'"'"' >&2; exit 1; }
        : >"$ROUTE_CONFLICTS_FILE"
        route_declared_in_file() {
          awk -v host="$1" '"'"'
            BEGIN {
              target=tolower(host);
              sub(/^https?:\/\//, "", target);
              sub(/:(80|443)$/, "", target);
              sub(/\.$/, "", target);
              depth=0;
            }
            {
              open_line=$0;
              close_line=$0;
              opens=gsub(/\{/, "{", open_line);
              closes=gsub(/\}/, "}", close_line);
              if (depth == 0 && index($0, "{") > 0) {
                header=$0;
                sub(/\{.*/, "", header);
                gsub(/[[:space:]]/, "", header);
                count=split(header, labels, ",");
                for (i=1; i<=count; i++) {
                  candidate=tolower(labels[i]);
                  sub(/^https?:\/\//, "", candidate);
                  sub(/:(80|443)$/, "", candidate);
                  sub(/\.$/, "", candidate);
                  if (candidate == target) found=1;
                }
              }
              depth += opens - closes;
            }
            END { exit found ? 0 : 1 }
          '"'"' "$2"
        }
        for host in ; do
          if route_declared_in_file "$host" "$MAIN_CONFIG_FILE"; then
            printf '"'"'%s\tmain\n'"'"' "$host" >>"$ROUTE_CONFLICTS_FILE"
            continue
          fi
          for file in "$CADDY_SITE_DIRECTORY"/*.caddy; do
            [ -f "$file" ] || continue
            [ "$file" = "$SITE_FILE" ] && continue
            if route_declared_in_file "$host" "$file"; then
              printf '"'"'%s\tmanaged\n'"'"' "$host" >>"$ROUTE_CONFLICTS_FILE"
              break
            fi
          done
        done
        if awk -F '"'"'\t'"'"' '"'"'$2 == "managed" { found=1 } END { exit found ? 0 : 1 }'"'"' "$ROUTE_CONFLICTS_FILE"; then
          managed_hosts="$(awk -F '"'"'\t'"'"' '"'"'$2 == "managed" { print $1 }'"'"' "$ROUTE_CONFLICTS_FILE" | paste -sd '"'"','"'"' -)"
          echo "AD-SRV-210：$managed_hosts 已由另一个项目管理，请先调整正式地址" >&2
          exit 1
        fi
        awk -F '"'"'\t'"'"' '"'"'$2 == "main" { print $1 }'"'"' "$ROUTE_CONFLICTS_FILE" >"$FILTER_HOSTS_FILE"
        awk -v hosts_file="$FILTER_HOSTS_FILE" '"'"'
          function normalize(value, normalized) {
            normalized=tolower(value);
            sub(/^https?:\/\//, "", normalized);
            sub(/:(80|443)$/, "", normalized);
            sub(/\.$/, "", normalized);
            return normalized;
          }
          BEGIN {
            while ((getline host < hosts_file) > 0) targets[normalize(host)]=1;
            close(hosts_file);
            depth=0;
            skip=0;
          }
          {
            open_line=$0;
            close_line=$0;
            opens=gsub(/\{/, "{", open_line);
            closes=gsub(/\}/, "}", close_line);
            if (!skip && depth == 0 && index($0, "{") > 0) {
              header=$0;
              sub(/\{.*/, "", header);
              gsub(/[[:space:]]/, "", header);
              count=split(header, labels, ",");
              for (i=1; i<=count; i++) {
                site_host=tolower(labels[i]);
                sub(/^https?:\/\//, "", site_host);
                sub(/:(80|443)$/, "", site_host);
                sub(/\.$/, "", site_host);
                if (targets[site_host]) skip=1;
              }
            }
            if (!skip) print;
            depth += opens - closes;
            if (skip && depth == 0) skip=0;
          }
        '"'"' "$CANDIDATE_FILE" >"$FILTERED_SITE_FILE"

          if [ -f "$SITE_FILE" ]; then cp "$SITE_FILE" "$SITE_FILE.previous"; else rm -f "$SITE_FILE.previous"; fi
          cp "$FILTERED_SITE_FILE" "$SITE_FILE"
          if ! docker exec "$CADDY_CONTAINER" caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile; then
            if [ -f "$SITE_FILE.previous" ]; then cp "$SITE_FILE.previous" "$SITE_FILE"; else rm -f "$SITE_FILE"; fi
            echo '"'"'AD-SRV-209：未冲突地址的配置校验失败，已恢复原路由'"'"' >&2
            exit 1
          fi
          if ! docker exec "$CADDY_CONTAINER" caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile; then
            if [ -f "$SITE_FILE.previous" ]; then cp "$SITE_FILE.previous" "$SITE_FILE"; else rm -f "$SITE_FILE"; fi
            docker exec "$CADDY_CONTAINER" caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile >/dev/null 2>&1 || true
            echo '"'"'AD-SRV-207：Caddy 重载失败，已恢复原路由'"'"' >&2
            exit 1
          fi
          while IFS="$(printf '"'"'\t'"'"')" read -r host source; do
            if [ "$source" = "main" ]; then
              printf '"'"'ROUTE_TAKEOVER_REQUIRED\t%s\n'"'"' "$host"
            fi
          done <"$ROUTE_CONFLICTS_FILE"
        else
          if [ -f "$SITE_FILE" ]; then cp "$SITE_FILE" "$SITE_FILE.previous"; else rm -f "$SITE_FILE.previous"; fi
          cp Caddyfile "$SITE_FILE"
          echo '"'"'ROUTE_PENDING: AD-SRV-203：应用已健康运行，但统一 Caddy 当前未运行。'"'"'
        fi
        fi'
    - name: 标记已验证镜像摘要
      script:
      - |-
        set -eu
        IMAGE_TAG="sha-${CNB_COMMIT}"
        VERIFIED_TAG="verified-${IMAGE_TAG}"
        IMAGE_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-api'
        IMAGE_DIGEST="$(docker buildx imagetools inspect "${IMAGE_REPOSITORY}:${IMAGE_TAG}" | awk '$1 == "Digest:" && $2 ~ /^sha256:/ { print $2; exit }')"
        case "$IMAGE_DIGEST" in sha256:*) ;; *) echo '镜像摘要解析失败' >&2; exit 1 ;; esac
        docker buildx imagetools create --prefer-index=false --tag "${IMAGE_REPOSITORY}:${VERIFIED_TAG}" "${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
        VERIFIED_DIGEST="$(docker buildx imagetools inspect "${IMAGE_REPOSITORY}:${VERIFIED_TAG}" | awk '$1 == "Digest:" && $2 ~ /^sha256:/ { print $2; exit }')"
        test "$VERIFIED_DIGEST" = "$IMAGE_DIGEST"
        IMAGE_REPOSITORY='docker.cnb.cool/owner/abcdeploy-hello-fullstack/abcdeploy-hello-fullstack-web'
        IMAGE_DIGEST="$(docker buildx imagetools inspect "${IMAGE_REPOSITORY}:${IMAGE_TAG}" | awk '$1 == "Digest:" && $2 ~ /^sha256:/ { print $2; exit }')"
        case "$IMAGE_DIGEST" in sha256:*) ;; *) echo '镜像摘要解析失败' >&2; exit 1 ;; esac
        docker buildx imagetools create --prefer-index=false --tag "${IMAGE_REPOSITORY}:${VERIFIED_TAG}" "${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
        VERIFIED_DIGEST="$(docker buildx imagetools inspect "${IMAGE_REPOSITORY}:${VERIFIED_TAG}" | awk '$1 == "Digest:" && $2 ~ /^sha256:/ { print $2; exit }')"
        test "$VERIFIED_DIGEST" = "$IMAGE_DIGEST"
    - name: 创建可在手机发布的候选版本
      script:
      - |-
        set -eu
        CANDIDATE_TAG="deploydesk-${CNB_COMMIT}"
        case "$CANDIDATE_TAG" in ''|*[!A-Za-z0-9._-]*) echo '候选版本标签无效' >&2; exit 1 ;; esac
        test -n "${CNB_TOKEN:-}"
        AUTH_HEADER="Authorization: Basic $(printf 'cnb:%s' "$CNB_TOKEN" | base64 | tr -d '\n')"
        REMOTE_SHA="$(git -c http.extraHeader="$AUTH_HEADER" ls-remote "$CNB_REPO_URL_HTTPS" "refs/tags/$CANDIDATE_TAG" | awk 'NR == 1 { print $1 }')"
        if [ -n "$REMOTE_SHA" ]; then test "$REMOTE_SHA" = "$CNB_COMMIT"; else git tag -f "$CANDIDATE_TAG" "$CNB_COMMIT"; git -c http.extraHeader="$AUTH_HEADER" push "$CNB_REPO_URL_HTTPS" "refs/tags/$CANDIDATE_TAG"; fi
        unset AUTH_HEADER
        printf '已验证候选版本：%s\n' "$CANDIDATE_TAG"
  tag_deploy.production:
  - docker:
      image: node:22-slim
    env:
      COREPACK_NPM_REGISTRY: https://registry.npmmirror.com
      DEPLOYDESK_ENV: production
      NO_PROXY: registry.npmmirror.com
      no_proxy: registry.npmmirror.com
      npm_config_registry: https://registry.npmmirror.com
    imports:
    - https://cnb.cool/replace-me/secret/-/blob/main/env.production.yml
    name: deploydesk-production-approved
    runner:
      cpus: 4
      tags: cnb:arch:amd64
    services:
    - docker
    stages:
    - name: 准备安全部署工具
      script:
      - apt-get update && apt-get install -y --no-install-recommends ca-certificates git openssh-client && rm -rf /var/lib/apt/lists/*
    - name: 登录镜像仓库
      script:
      - |-
        test -n "$CNB_TOKEN"
        printf '%s' "$CNB_TOKEN" | docker login docker.cnb.cool --username "${CNB_USERNAME:-cnb}" --password-stdin
    - name: 按已验证摘要部署生产环境
      script:
      - |-
        set -eu
        IMAGE_TAG="sha-${CNB_COMMIT}"
        RELEASE_TAG="verified-${IMAGE_TAG}"
        RUNTIME_DIRECTORY='.deploydesk/runtime/production'
        rm -rf "$RUNTIME_DIRECTORY"
        install -d -m 700 "$RUNTIME_DIRECTORY"
