# 由 DeployDesk 生成。真实 .env 只保存在目标环境。
name: deploydesk-hello-fullstack-staging
services:
  api:
    image: ${DEPLOYDESK_API_IMAGE:?请填写不可变镜像地址}
    restart: unless-stopped
    env_file:
    - .runtime.env
    environment:
      DEPLOYDESK_ENV: staging
    networks:
      apps:
        aliases:
        - deploydesk-hello-fullstack-staging-api
    labels:
      deploydesk.environment: staging
      deploydesk.project: deploydesk-hello-fullstack
      deploydesk.service: api
    healthcheck:
      test:
      - CMD-SHELL
      - node -e "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
  web:
    image: ${DEPLOYDESK_WEB_IMAGE:?请填写不可变镜像地址}
    restart: unless-stopped
    env_file:
    - .runtime.env
    environment:
      DEPLOYDESK_ENV: staging
    networks:
      apps:
        aliases:
        - deploydesk-hello-fullstack-staging-web
    labels:
      deploydesk.environment: staging
      deploydesk.project: deploydesk-hello-fullstack
      deploydesk.service: web
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q --spider http://127.0.0.1:80/
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
networks:
  apps:
    external: true
    name: deploydesk-deploydesk-hello-fullstack-staging
