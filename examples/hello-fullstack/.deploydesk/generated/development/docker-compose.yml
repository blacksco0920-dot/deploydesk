# 由 ABCDeploy 生成。真实 .env 只保存在目标环境。
name: abcdeploy-hello-fullstack-development
services:
  api:
    build:
      context: ../../..
      dockerfile: apps/api/Dockerfile
    restart: no
    env_file:
    - ../../runtime/development.env
    extra_hosts:
    - host.docker.internal:host-gateway
    ports:
    - 127.0.0.1:3000:3000
    environment:
      DEPLOYDESK_ENV: development
    networks:
      apps:
        aliases:
        - abcdeploy-hello-fullstack-api
        - abcdeploy-hello-fullstack-development-api
    labels:
      deploydesk.environment: development
      deploydesk.project: abcdeploy-hello-fullstack
      deploydesk.service: api
    healthcheck:
      test:
      - CMD-SHELL
      - node -e "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
  web:
    build:
      context: ../../..
      dockerfile: apps/web/Dockerfile
    restart: no
    env_file:
    - ../../runtime/development.env
    extra_hosts:
    - host.docker.internal:host-gateway
    ports:
    - 127.0.0.1:4174:80
    environment:
      DEPLOYDESK_ENV: development
    networks:
      apps:
        aliases:
        - abcdeploy-hello-fullstack-development-web
        - abcdeploy-hello-fullstack-web
    labels:
      deploydesk.environment: development
      deploydesk.project: abcdeploy-hello-fullstack
      deploydesk.service: web
    healthcheck:
      test:
      - CMD-SHELL
      - wget -Y off -q --spider http://127.0.0.1:80/
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
networks:
  apps:
    external: false
    name: deploydesk-abcdeploy-hello-fullstack-development
